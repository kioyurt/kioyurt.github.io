<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的个人网站</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7fb;
      color: #222;
    }
    .container {
      max-width: 760px;
      margin: 80px auto;
      padding: 40px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }
    p {
      font-size: 18px;
      line-height: 1.8;
    }
    .tag {
      display: inline-block;
      margin: 6px 8px 6px 0;
      padding: 6px 12px;
      border-radius: 999px;
      background: #eef2ff;
    }
    a {
      color: #2563eb;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>你好，我是你的名字</h1>
    <p>这里是我的个人网站。我关注前端开发、设计、AI 工具和个人成长。</p>

    <h2>关于我</h2>
    <p>可以在这里写你的经历、技能、项目、作品集或联系方式。</p>

    <h2>技能</h2>
    <span class="tag">HTML</span>
    <span class="tag">CSS</span>
    <span class="tag">JavaScript</span>
    <span class="tag">AI</span>

    <h2>联系我</h2>
    <p>
      邮箱：yourname@example.com<br />
      GitHub：<a href="#">你的 GitHub 链接</a>
    </p>
  </main>
</body>
</html>
