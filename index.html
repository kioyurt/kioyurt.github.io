<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kioyurt 的个人网站</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: white;
      overflow-x: hidden;
      background: radial-gradient(circle at top, #1e1b4b, #020617 55%, #000);
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: -2;
    }

    .glow {
      position: fixed;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00f5ff, #8b5cf6, #ec4899);
      filter: blur(120px);
      opacity: 0.35;
      z-index: -1;
      animation: float 8s ease-in-out infinite alternate;
    }

    .glow.one {
      top: -80px;
      left: -80px;
    }

    .glow.two {
      right: -100px;
      bottom: -100px;
      animation-delay: 2s;
    }

    @keyframes float {
      from {
        transform: translateY(0) translateX(0);
      }
      to {
        transform: translateY(60px) translateX(80px);
      }
    }

    header {
      width: 100%;
      padding: 28px 8%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 10;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #38bdf8, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      color: transparent;
    }

    nav a {
      color: #cbd5e1;
      margin-left: 24px;
      text-decoration: none;
      transition: 0.3s;
    }

    nav a:hover {
      color: #38bdf8;
      text-shadow: 0 0 12px #38bdf8;
    }

    .hero {
      min-height: calc(100vh - 90px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 8%;
    }

    .card {
      width: 100%;
      max-width: 1000px;
      padding: 60px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(15, 23, 42, 0.62);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      box-shadow: 0 0 60px rgba(56, 189, 248, 0.18);
      animation: fadeUp 1s ease forwards;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .tagline {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.12);
      color: #7dd3fc;
      border: 1px solid rgba(125, 211, 252, 0.3);
      margin-bottom: 24px;
    }

    h1 {
      font-size: clamp(42px, 8vw, 86px);
      line-height: 1.05;
      margin-bottom: 24px;
    }

    h1 span {
      background: linear-gradient(90deg, #38bdf8, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      color: transparent;
    }

    .typing {
      font-size: 24px;
      color: #cbd5e1;
      min-height: 36px;
      margin-bottom: 28px;
    }

    .typing::after {
      content: "|";
      color: #38bdf8;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .intro {
      max-width: 680px;
      font-size: 18px;
      color: #cbd5e1;
      line-height: 1.8;
      margin-bottom: 36px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 44px;
    }

    .btn {
      padding: 14px 24px;
      border-radius: 999px;
      text-decoration: none;
      color: white;
      background: linear-gradient(90deg, #2563eb, #7c3aed, #db2777);
      box-shadow: 0 0 24px rgba(59, 130, 246, 0.4);
      transition: 0.3s;
    }

    .btn:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 0 36px rgba(168, 85, 247, 0.7);
    }

    .btn.secondary {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .mini-card {
      padding: 24px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      transition: 0.3s;
    }

    .mini-card:hover {
      transform: translateY(-8px);
      background: rgba(56, 189, 248, 0.12);
      box-shadow: 0 0 30px rgba(56, 189, 248, 0.18);
    }

    .mini-card h3 {
      margin-bottom: 10px;
      color: #7dd3fc;
    }

    .mini-card p {
      color: #cbd5e1;
      line-height: 1.6;
    }

    footer {
      text-align: center;
      color: #64748b;
      padding: 30px;
    }

    @media (max-width: 768px) {
      header {
        padding: 22px 6%;
      }

      nav {
        display: none;
      }

      .card {
        padding: 36px 24px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .typing {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>
  <canvas id="stars"></canvas>

  <div class="glow one"></div>
  <div class="glow two"></div>

  <header>
    <div class="logo">KIOYURT</div>
    <nav>
      <a href="#about">关于我</a>
      <a href="#skills">技能</a>
      <a href="#contact">联系</a>
    </nav>
  </header>

  <section class="hero">
    <div class="card">
      <div class="tagline">欢迎来到我的数字空间</div>

      <h1>你好，我是 <span>kioyurt</span></h1>

      <div class="typing" id="typing"></div>

      <p class="intro" id="about">
        这是我的个人网站。我会在这里展示我的学习、项目、作品和想法。
        我正在探索编程、设计、AI 工具和互联网创造。
      </p>

      <div class="buttons">
        <a class="btn" href="https://github.com/kioyurt" target="_blank">访问我的 GitHub</a>
        <a class="btn secondary" href="mailto:your-email@example.com">联系我</a>
      </div>

      <div class="grid" id="skills">
        <div class="mini-card">
          <h3>前端开发</h3>
          <p>HTML、CSS、JavaScript，打造漂亮又实用的网页。</p>
        </div>

        <div class="mini-card">
          <h3>个人项目</h3>
          <p>记录自己的作品、学习成果和有趣的实验。</p>
        </div>

        <div class="mini-card" id="contact">
          <h3>持续进化</h3>
          <p>每天学习一点点，把网站变成自己的数字名片。</p>
        </div>
      </div>
    </div>
  </section>

  <footer>
    © 2025 kioyurt. Built with GitHub Pages.
  </footer>

  <script>
    const words = [
      "前端学习者",
      "AI 工具探索者",
      "个人网站创建者",
      "正在变强的创作者"
    ];

    let wordIndex = 0;
    let charIndex = 0;
    let isDeleting = false;
    const typingElement = document.getElementById("typing");

    function typeEffect() {
      const currentWord = words[wordIndex];

      if (isDeleting) {
        typingElement.textContent = currentWord.substring(0, charIndex--);
      } else {
        typingElement.textContent = currentWord.substring(0, charIndex++);
      }

      if (!isDeleting && charIndex === currentWord.length + 1) {
        isDeleting = true;
        setTimeout(typeEffect, 1200);
        return;
      }

      if (isDeleting && charIndex === 0) {
        isDeleting = false;
        wordIndex = (wordIndex + 1) % words.length;
      }

      setTimeout(typeEffect, isDeleting ? 60 : 120);
    }

    typeEffect();

    const canvas = document.getElementById("stars");
    const ctx = canvas.getContext("2d");

    let stars = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      createStars();
    }

    function createStars() {
      stars = [];
      for (let i = 0; i < 120; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.8,
          speed: Math.random() * 0.5 + 0.2
        });
      }
    }

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const star of stars) {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
        ctx.fill();

        star.y += star.speed;

        if (star.y > canvas.height) {
          star.y = 0;
          star.x = Math.random() * canvas.width;
        }
      }

      requestAnimationFrame(drawStars);
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();
    drawStars();
  </script>
</body>
</html>
